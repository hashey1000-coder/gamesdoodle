name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Save previous sitemap (for IndexNow diff)
        run: cp public/sitemap.xml /tmp/prev-sitemap.xml

      - name: Build site
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Upload dist files
        run: |
          scp -r dist/* \
          ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:/home/sassache2/gamesdoodle.org/

      - name: Submit new URLs to Bing IndexNow
        run: node submit-indexnow.cjs /tmp/prev-sitemap.xml