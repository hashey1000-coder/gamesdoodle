name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch live sitemap for IndexNow diff
        run: curl -sf https://gamesdoodle.org/sitemap.xml -o /tmp/prev-sitemap.xml || echo "" > /tmp/prev-sitemap.xml

      - name: Build site
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Setup SSH
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
        run: |
          set -euo pipefail

          SSH_PORT="${CPANEL_SSH_PORT:-2239}"

          if [ -z "${CPANEL_HOST}" ]; then
            echo "CPANEL_HOST secret is empty or missing"
            exit 1
          fi

          if [ -z "${CPANEL_USER}" ]; then
            echo "CPANEL_USER secret is empty or missing"
            exit 1
          fi

          if [ -z "${CPANEL_SSH_KEY}" ]; then
            echo "CPANEL_SSH_KEY secret is empty or missing"
            exit 1
          fi

          if ! [[ "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "CPANEL_SSH_PORT must be a numeric port, got: $SSH_PORT"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$CPANEL_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keyscan -T 15 -p "$SSH_PORT" -H "$CPANEL_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan failed for host: $CPANEL_HOST on port $SSH_PORT"
            exit 1
          fi

          if ! ssh \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o PubkeyAuthentication=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -p "$SSH_PORT" \
            "$CPANEL_USER@$CPANEL_HOST" true; then
            echo "SSH authentication failed. Verify CPANEL_USER and ensure CPANEL_SSH_KEY contains the matching private key for the authorized public key in cPanel."
            exit 1
          fi

      - name: Upload dist files
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${CPANEL_SSH_PORT:-2239}"
          scp \
          -i ~/.ssh/id_ed25519 \
          -o IdentitiesOnly=yes \
          -o PreferredAuthentications=publickey \
          -o PubkeyAuthentication=yes \
          -o BatchMode=yes \
          -P "$SSH_PORT" \
          -r dist/* \
          "$CPANEL_USER@$CPANEL_HOST:/home/sassache2/gamesdoodle.org/"

      - name: Submit new URLs to Bing IndexNow
        run: node submit-indexnow.cjs /tmp/prev-sitemap.xml